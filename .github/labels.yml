# kind: maps to conventional commit types
- name: "kind:bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "kind:enhancement"
  color: "a2eeef"
  description: "New feature or improvement"
- name: "kind:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "kind:chore"
  color: "ededed"
  description: "Maintenance, deps, CI config"
- name: "kind:refactor"
  color: "d4c5f9"
  description: "Code restructuring, no behavior change"
- name: "kind:test"
  color: "bfd4f2"
  description: "Test additions or corrections"
- name: "kind:question"
  color: "d876e3"
  description: "Needs clarification or discussion"

# area: maps to CLAUDE.md task routing
- name: "area:home"
  color: "1d76db"
  description: "Marketing site (home/)"
- name: "area:skills"
  color: "0e8a16"
  description: "Agent skills (skills/)"
- name: "area:templates"
  color: "006b75"
  description: "Platform templates (skills/*/templates/)"
- name: "area:schema"
  color: "fbca04"
  description: "Config model and JSON schema"
- name: "area:ci"
  color: "b60205"
  description: "CI/CD and GitHub workflows"
- name: "area:docs"
  color: "0075ca"
  description: "Documentation (docs/)"

# platform: for template-scoped issues
- name: "platform:react-native"
  color: "61dafb"
  description: "React Native templates (canonical)"
- name: "platform:flutter"
  color: "02569b"
  description: "Flutter templates"
- name: "platform:ios"
  color: "000000"
  description: "iOS/Swift templates"
- name: "platform:android"
  color: "3ddc84"
  description: "Android/Kotlin templates"

# priority
- name: "priority:critical"
  color: "b60205"
  description: "Must fix immediately"
- name: "priority:high"
  color: "d93f0b"
  description: "Should fix in current cycle"
- name: "priority:low"
  color: "c5def5"
  description: "Nice to have"

# triage
- name: "triage:needs-info"
  color: "e4e669"
  description: "Waiting for reporter clarification"
- name: "triage:accepted"
  color: "0e8a16"
  description: "Triaged and accepted for work"

# close reason
- name: "close:duplicate"
  color: "cfd3d7"
  description: "Duplicate of existing issue"
- name: "close:invalid"
  color: "cfd3d7"
  description: "Not a valid issue"
- name: "close:wontfix"
  color: "cfd3d7"
  description: "Intentional behavior or out of scope"

# GitHub special labels (preserved for contributor discovery)
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"
