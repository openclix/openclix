name: Test OpenClix Templates

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test-templates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./skills/openclix-init

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Run template test suite
        run: TZ=UTC bun test

      - name: Run template verification
        working-directory: .
        run: ./scripts/verify_templates.sh react-native
